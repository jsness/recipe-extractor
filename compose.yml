services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: recipes
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/jsness/recipe-extractor:latest
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Override DATABASE_URL to use compose service hostname
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/recipes?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
